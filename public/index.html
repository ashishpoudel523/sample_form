<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="form-box">
      <h1>Sign up here</h1>
      <p class="subtitle">
        Sign up to create your account and unlock exclusive features!
      </p>

      <div id="messageBox" class="message-box"></div>

      <form id="registerForm" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
            />
            <span class="error-text" id="usernameError"></span>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
            />
            <span class="error-text" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrap">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
              />
            </div>
            <span class="error-text" id="passwordError"></span>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrap">
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Confirm your password"
              />
            </div>
            <span class="error-text" id="confirmPasswordError"></span>
          </div>

          <div class="form-group">
            <label for="address">Address</label>
            <input
              type="text"
              id="address"
              name="address"
              placeholder="Enter your address"
            />
            <span class="error-text" id="addressError"></span>
          </div>

          <div class="form-group">
            <label for="phone">Phone</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="Enter your phone number"
            />
            <span class="error-text" id="phoneError"></span>
          </div>

          <div class="form-group full-width">
            <label>Gender</label>
            <div class="gender-options">
              <label>
                <input type="radio" name="gender" value="male" />
                Male
              </label>
              <label>
                <input type="radio" name="gender" value="female" />
                Female
              </label>
              <label>
                <input type="radio" name="gender" value="other" />
                Other
              </label>
            </div>
            <span class="error-text" id="genderError"></span>
          </div>
        </div>

        <button type="submit" class="btn-register">Register</button>
      </form>

      <p class="form-footer">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>

    <script src="js/register.js"></script>
  </body>
</html>
